version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hvhc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-bigdata}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql_migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - hvhc_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hvhc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hvhc_network
    restart: unless-stopped

  # ML Engine với GPU Support
  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile.gpu
    container_name: hvhc_ml_engine
    runtime: nvidia  # NVIDIA Docker runtime
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-bigdata}
      - REDIS_URL=redis://redis:6379
      - CUDA_VISIBLE_DEVICES=0  # Sử dụng GPU 0, thay đổi nếu có nhiều GPU
      - TF_FORCE_GPU_ALLOW_GROWTH=true  # Tránh TensorFlow chiếm hết VRAM
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512  # PyTorch memory management
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1  # Số GPU sử dụng
              capabilities: [gpu]
    volumes:
      - ./ml_engine:/app
      - ml_models:/app/models
      - ml_data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - hvhc_network
    restart: unless-stopped
    command: python app.py

  # Next.js Web Application
  web:
    build:
      context: ./nextjs_space
      dockerfile: Dockerfile
    container_name: hvhc_web
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-bigdata}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - ML_ENGINE_URL=http://ml_engine:5000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./nextjs_space:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - ml_engine
    networks:
      - hvhc_network
    restart: unless-stopped
    command: yarn start

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hvhc_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - hvhc_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local
  ml_data:
    driver: local

networks:
  hvhc_network:
    driver: bridge
