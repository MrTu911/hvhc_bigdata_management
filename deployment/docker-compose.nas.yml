
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hvhc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hvhc_bigdata
      POSTGRES_USER: hvhcapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hvhc_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /volume1/docker/hvhc_bigdata/postgres_data:/var/lib/postgresql/data
      - /volume1/docker/hvhc_bigdata/postgres_backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvhcapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hvhc-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hvhc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hvhc_redis_password}
    volumes:
      - /volume1/docker/hvhc_bigdata/redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hvhc-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.nas
    container_name: hvhc-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hvhcapp:${DB_PASSWORD:-hvhc_secure_password}@postgres:5432/hvhc_bigdata
      REDIS_URL: redis://:${REDIS_PASSWORD:-hvhc_redis_password}@redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - /volume1/docker/hvhc_bigdata/uploads:/app/uploads
      - /volume1/docker/hvhc_bigdata/logs:/app/logs
    ports:
      - "3000:3000"
    networks:
      - hvhc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ML Engine (Optional)
  ml-engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    container_name: hvhc-ml-engine
    restart: unless-stopped
    environment:
      PYTHON_ENV: production
    volumes:
      - /volume1/docker/hvhc_bigdata/ml_models:/app/models
      - /volume1/docker/hvhc_bigdata/ml_data:/app/data
    ports:
      - "8000:8000"
    networks:
      - hvhc-network
    profiles:
      - ml  # Optional service, start with: docker-compose --profile ml up

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hvhc-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - /volume1/docker/hvhc_bigdata/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /volume1/docker/hvhc_bigdata/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hvhc-network
    profiles:
      - nginx  # Optional, for SSL/reverse proxy

networks:
  hvhc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
