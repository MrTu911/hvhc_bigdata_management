
# Prometheus Alert Rules for HVHC Big Data System

groups:
  - name: hvhc_system_alerts
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes on {{ $labels.instance }}"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% on {{ $labels.instance }}"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 20
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 20% on {{ $labels.instance }}"

  - name: hvhc_database_alerts
    rules:
      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is not responding"

      # High Database Connections
      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connections"
          description: "Database connections are above 80% of maximum"

      # Long Running Transactions
      - alert: LongRunningTransaction
        expr: max(pg_stat_activity_max_tx_duration{datname!~"template.*"}) > 3600
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Long running transaction detected"
          description: "Transaction running for more than 1 hour detected"

  - name: hvhc_redis_alerts
    rules:
      # Redis Down
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis is down"
          description: "Redis cache server is not responding"

      # High Redis Memory Usage
      - alert: HighRedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is above 90%"

  - name: hvhc_application_alerts
    rules:
      # Application Down
      - alert: HVHCAPIDown
        expr: up{job="hvhc-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: application
        annotations:
          summary: "HVHC API is down"
          description: "HVHC Big Data API is not responding"

      # High Response Time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: application
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is above 2 seconds"

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
          service: application
        annotations:
          summary: "High error rate"
          description: "Error rate is above 5% for the last 5 minutes"

  - name: hvhc_ml_alerts
    rules:
      # ML Engine Down
      - alert: MLEngineDown
        expr: up{job="ml-engine"} == 0
        for: 2m
        labels:
          severity: critical
          service: ml
        annotations:
          summary: "ML Engine is down"
          description: "Machine Learning Engine is not responding"

      # Failed ML Training
      - alert: FailedMLTraining
        expr: increase(ml_training_failures_total[1h]) > 5
        for: 5m
        labels:
          severity: warning
          service: ml
        annotations:
          summary: "High ML training failure rate"
          description: "More than 5 ML training failures in the last hour"

  - name: hvhc_etl_alerts
    rules:
      # ETL Job Failures
      - alert: ETLJobFailure
        expr: increase(etl_executions_failed_total[1h]) > 3
        for: 5m
        labels:
          severity: warning
          service: etl
        annotations:
          summary: "High ETL failure rate"
          description: "More than 3 ETL job failures in the last hour"

      # ETL Job Duration
      - alert: LongETLJob
        expr: etl_job_duration_seconds > 3600
        for: 5m
        labels:
          severity: warning
          service: etl
        annotations:
          summary: "Long running ETL job"
          description: "ETL job has been running for more than 1 hour"
